monitor.bluez.properties = {
  # Disabling this stops the "150% volume crash" and reconnect loop
  "bluez5.enable-hw-volume": false,
  
  # Ensures the mic is always available and uses stable codecs
  "bluez5.roles": [ "a2dp_sink", "a2dp_source", "hfp_hf", "hfp_ag" ],
  "bluez5.codecs": [ "msbc", "sbc", "cvsd" ],
  
  # Triggers the switch to "Headset" mode automatically for Vesktop
  "bluez5.autoswitch-to-headset-profile": true
}
