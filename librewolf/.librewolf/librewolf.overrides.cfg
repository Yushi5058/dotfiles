// Low RAM optimization for i5 7th gen / 8GB RAM

// Limit content processes (saves ~30% RAM)
defaultPref("dom.ipc.processCount", 2);

// Unload background tabs when RAM is low
defaultPref("browser.tabs.unloadOnLowMemory", true);

// Cap memory cache to 512MB
defaultPref("browser.cache.memory.capacity", 524288);

// Block autoplay (saves CPU)
defaultPref("media.autoplay.default", 5);

// Cap image memory
defaultPref("image.mem.surfacecache_max_size_kb", 262144);

// Hardware acceleration for video (VA-API)
defaultPref("media.hardware-video-decoding.force-enabled", true);
defaultPref("media.ffmpeg.vaapi.enabled", true);

// Disable background tabs from eating CPU
defaultPref("browser.sessionhistory.max_entries", 10);

// Reduce disk cache to save RAM
defaultPref("browser.cache.disk.capacity", 50000);

// Aggressive tab discarding
defaultPref("browser.contentSettings.cache.enabled", false);

// Disable smooth scrolling to save CPU
defaultPref("general.smoothScroll", false);

// Limit DOM workers
defaultPref("dom.serviceWorkers.parentInterception", false);